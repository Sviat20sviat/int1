<header
  class="sticky top-0 left-0 w-full z-50 transition-colors duration-500 bg-bg-primary/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 main-header">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 header-cont">
    <div class="flex">
      <div class="brand-logo">
        <span class="logo-bracket">&lt;</span>
        <span class="logo-text">Dev</span>
        <span class="logo-bracket">/&gt;</span>
      </div>
    </div>
    <div class="nav-menu" id="navMenu">
      <a href="#home" class="nav-link" [class.selected]="selectedSection() === 'home'"
        (click)="selectSection('home', $event)">
        <i class="fas fa-home"></i>
        <span class="nav-text">{{ 'HEADER.HOME' | translate }}</span>
      </a>
      <a href="#about" class="nav-link" [class.selected]="selectedSection() === 'about'"
        (click)="selectSection('about', $event)">
        <i class="fas fa-user"></i>
        <span class="nav-text">{{ 'HEADER.ABOUT' | translate }}</span>
      </a>
      <a href="#skills" class="nav-link" [class.selected]="selectedSection() === 'skills'"
        (click)="selectSection('skills', $event)">
        <i class="fas fa-code"></i>
        <span class="nav-text">{{ 'HEADER.SKILLS' | translate }}</span>
      </a>
      <a href="#experience" class="nav-link" [class.selected]="selectedSection() === 'experience'"
        (click)="selectSection('experience', $event)">
        <i class="fas fa-briefcase"></i>
        <span class="nav-text">{{ 'HEADER.EXPERIENCE' | translate }}</span>
      </a>
      <a href="#projects" class="nav-link" [class.selected]="selectedSection() === 'projects'"
        (click)="selectSection('projects', $event)">
        <i class="fas fa-rocket"></i>
        <span class="nav-text">{{ 'HEADER.PROJECTS' | translate }}</span>
      </a>
      <a href="#contact" class="nav-link" [class.selected]="selectedSection() === 'contact'"
        (click)="selectSection('contact', $event)">
        <i class="fas fa-envelope"></i>
        <span class="nav-text">{{ 'HEADER.CONTACT' | translate }}</span>
      </a>
    </div>
    <div class="flex relative items-center">

      <div class="flex-1 flex justify-end">
        <label>
          <input type="checkbox" checked (click)="themeService.toggleTheme()">
          <div class="planet">
          </div>
          <div class="elements">
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
            <svg version="1.1" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
              <circle cx="250" cy="250" r="200" />
            </svg>
          </div>
        </label>
      </div>
      <app-custom-select [options]="availableLanguages" [formControl]="languageControl" placeholder="Language">
      </app-custom-select>
    </div>
  </div>
</header>
